services:
  - type: web
    name: file-compressor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: 1
    plan: free  # Change to 'starter' for paid plan ($7/month)
